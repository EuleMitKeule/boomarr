services:
  boomarr:
    build: .
    container_name: boomarr
    environment:
      PUID: 1000
      PGID: 1000
      UMASK: "022"
      TZ: UTC
      LOG_LEVEL: debug
    volumes:
      - ./config-docker:/config
      - ./config-docker/output:/media/output:rw
      - ./tests/fixtures/media/movies:/media/movies:ro
      - ./tests/fixtures/media/shows:/media/shows:ro
    command: boomarr watch
